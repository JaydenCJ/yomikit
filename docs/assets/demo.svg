<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" font-family="'SF Mono','Menlo','Consolas',monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c8ea6"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="420" rx="12" fill="#101418"/>
  <text x="480" y="34" text-anchor="middle" fill="#9fb2c8" font-size="15">YomiKit pipeline — recognition backend in, structured Japanese document out (illustration, not a screenshot)</text>

  <!-- Input: OCR observations of a receipt -->
  <rect x="28" y="62" width="264" height="300" rx="10" fill="#1a2027" stroke="#2d3843"/>
  <text x="160" y="88" text-anchor="middle" fill="#8ba7c7" font-size="13">OCR text + bounding boxes</text>
  <text x="48" y="122" fill="#e8edf3" font-size="16">スーパーマルヤマ 川崎店</text>
  <text x="48" y="150" fill="#c3ccd6" font-size="13">2026年7月8日(火) 18:42</text>
  <text x="48" y="182" fill="#c3ccd6" font-size="13">おにぎり ツナマヨ   ¥138</text>
  <text x="48" y="206" fill="#c3ccd6" font-size="13">サンドイッチ ハム   ¥298</text>
  <text x="48" y="230" fill="#c3ccd6" font-size="13">お茶 500ml ×2       ¥216</text>
  <text x="48" y="254" fill="#c3ccd6" font-size="13">お値引き             -20</text>
  <text x="48" y="282" fill="#c3ccd6" font-size="13">小計                ¥752</text>
  <text x="48" y="306" fill="#c3ccd6" font-size="13">合計                ¥814</text>
  <text x="48" y="330" fill="#8a95a3" font-size="12">(8%対象 ¥652 消費税 ¥52)</text>
  <text x="48" y="350" fill="#8a95a3" font-size="12">お預り ¥1,000 / お釣り ¥186</text>

  <!-- Pipeline stages -->
  <line x1="292" y1="212" x2="352" y2="212" stroke="#7c8ea6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="356" y="92" width="248" height="240" rx="10" fill="#152030" stroke="#2b4257"/>
  <text x="480" y="120" text-anchor="middle" fill="#9cc3ec" font-size="14">YomiKitCore</text>
  <rect x="376" y="136" width="208" height="34" rx="6" fill="#1d2b3c"/>
  <text x="480" y="158" text-anchor="middle" fill="#d5e3f2" font-size="12">OCRBackend (Vision / Core ML / Mock)</text>
  <rect x="376" y="180" width="208" height="34" rx="6" fill="#1d2b3c"/>
  <text x="480" y="202" text-anchor="middle" fill="#d5e3f2" font-size="12">LayoutAnalyzer (tategaki-aware)</text>
  <rect x="376" y="224" width="208" height="34" rx="6" fill="#1d2b3c"/>
  <text x="480" y="246" text-anchor="middle" fill="#d5e3f2" font-size="12">TableReconstructor</text>
  <rect x="376" y="268" width="208" height="34" rx="6" fill="#1d2b3c"/>
  <text x="480" y="290" text-anchor="middle" fill="#d5e3f2" font-size="12">ReceiptFieldExtractor</text>
  <text x="480" y="322" text-anchor="middle" fill="#6f8196" font-size="11">100% on-device · no network · Linux-testable</text>

  <!-- Output: structured JSON -->
  <line x1="604" y1="212" x2="664" y2="212" stroke="#7c8ea6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="668" y="62" width="264" height="300" rx="10" fill="#16211a" stroke="#2b4232"/>
  <text x="800" y="88" text-anchor="middle" fill="#95c6a3" font-size="13">Structured output (JSON / Markdown)</text>
  <text x="688" y="118" fill="#c8d8cc" font-size="12">{</text>
  <text x="700" y="140" fill="#c8d8cc" font-size="12">"storeName": "スーパーマルヤマ 川崎店",</text>
  <text x="700" y="162" fill="#c8d8cc" font-size="12">"date": "2026-07-08",</text>
  <text x="700" y="184" fill="#c8d8cc" font-size="12">"time": "18:42",</text>
  <text x="700" y="206" fill="#c8d8cc" font-size="12">"items": [ 5 items, ¥752 ],</text>
  <text x="700" y="228" fill="#c8d8cc" font-size="12">"subtotal": 752,</text>
  <text x="700" y="250" fill="#c8d8cc" font-size="12">"total": 814,</text>
  <text x="700" y="272" fill="#c8d8cc" font-size="12">"taxLines": [ 8%: 52, 10%: 10 ],</text>
  <text x="700" y="294" fill="#c8d8cc" font-size="12">"tendered": 1000,</text>
  <text x="700" y="316" fill="#c8d8cc" font-size="12">"change": 186</text>
  <text x="688" y="338" fill="#c8d8cc" font-size="12">}</text>

  <text x="480" y="398" text-anchor="middle" fill="#6f8196" font-size="12">Vertical-text reading order · table structure · Japanese receipt fields — all offline</text>
</svg>
